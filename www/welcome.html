<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>欢迎页面</title>
    <style>
        .container { 
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            text-align: center;
        }
        h2 {
            color: #409eff;
        }
        p {
            font-size: 16px;
            margin: 20px 0;
        }
        button {
            width: 100px;
            height: 35px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>登录成功！</h2>
        <p>欢迎进入系统</p>
        <button onclick="window.location.href='/index.html'">退出登录</button>
    </div>
</body>
</html>
