<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自定义登录测试页面</title>
    <style>
        /* 简单美化，方便截图和操作 */
        .container {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .form-item {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 80px;
        }
        input {
            width: 250px;
            height: 25px;
            padding: 0 5px;
        }
        button {
            width: 100%;
            height: 35px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #errorMsg {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
        #successMsg {
            color: green;
            margin-top: 10px;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录表单：核心测试元素 -->
        <div id="loginForm">
            <h2 style="text-align: center;">用户登录</h2>
            <div class="form-item">
                <label>用户名：</label>
                <!-- 用户名输入框：id固定为username，用于XPath定位 -->
                <input type="text" id="username" maxlength="20" placeholder="请输入用户名">
            </div>
            <div class="form-item">
                <label>密  码：</label>
                <!-- 密码输入框：id固定为password，用于XPath定位 -->
                <input type="password" id="password" maxlength="20" placeholder="请输入密码">
            </div>
            <!-- 登录按钮：id固定为loginBtn，用于XPath定位 -->
            <button id="loginBtn">登 录</button>
            <!-- 注册链接 -->
            <div style="text-align: center; margin-top: 10px;">
                <a href="#" id="registerLink">还没有账号？点击注册</a>
            </div>
            <!-- 错误提示信息：id固定为errorMsg，用于断言校验 -->
            <div id="errorMsg"></div>
        </div>
        
        <!-- 注册表单 -->
        <div id="registerForm" style="display: none;">
            <h2 style="text-align: center;">用户注册</h2>
            <div class="form-item">
                <label>用户名：</label>
                <input type="text" id="regUsername" maxlength="20" placeholder="请输入用户名">
            </div>
            <div class="form-item">
                <label>密  码：</label>
                <input type="password" id="regPassword" maxlength="20" placeholder="请输入密码">
            </div>
            <div class="form-item">
                <label>确认密码：</label>
                <input type="password" id="regConfirmPassword" maxlength="20" placeholder="请确认密码">
            </div>
            <!-- 注册按钮 -->
            <button id="registerBtn">注 册</button>
            <!-- 登录链接 -->
            <div style="text-align: center; margin-top: 10px;">
                <a href="#" id="loginLink">已有账号？点击登录</a>
            </div>
            <!-- 错误提示信息 -->
            <div id="regErrorMsg"></div>
        </div>
        
        <!-- 登录成功提示：id固定为successMsg，用于断言校验 -->
        <div id="successMsg" style="display: none;">
            恭喜您，登录成功！<br>
            欢迎进入系统
        </div>
    </div>

    <!-- 登录和注册逻辑：与后端交互 -->
    <script>
        // 页面加载完成后执行
        window.onload = function() {
            console.log('页面加载完成');
            
            // 获取元素
            const usernameInput = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            const loginBtn = document.getElementById("loginBtn");
            const errorMsg = document.getElementById("errorMsg");
            const loginForm = document.getElementById("loginForm");
            const successMsg = document.getElementById("successMsg");
            const registerLink = document.getElementById("registerLink");
            const registerForm = document.getElementById("registerForm");
            const loginLink = document.getElementById("loginLink");
            const regUsernameInput = document.getElementById("regUsername");
            const regPasswordInput = document.getElementById("regPassword");
            const regConfirmPasswordInput = document.getElementById("regConfirmPassword");
            const registerBtn = document.getElementById("registerBtn");
            const regErrorMsg = document.getElementById("regErrorMsg");

            console.log('元素获取成功:', {
                usernameInput: !!usernameInput,
                passwordInput: !!passwordInput,
                loginBtn: !!loginBtn,
                errorMsg: !!errorMsg,
                loginForm: !!loginForm,
                successMsg: !!successMsg,
                registerLink: !!registerLink,
                registerForm: !!registerForm,
                loginLink: !!loginLink,
                regUsernameInput: !!regUsernameInput,
                regPasswordInput: !!regPasswordInput,
                regConfirmPasswordInput: !!regConfirmPasswordInput,
                registerBtn: !!registerBtn,
                regErrorMsg: !!regErrorMsg
            });

            // 切换到注册表单
            registerLink.addEventListener("click", function(e) {
                e.preventDefault();
                console.log('切换到注册表单');
                loginForm.style.display = "none";
                registerForm.style.display = "block";
            });

            // 切换到登录表单
            loginLink.addEventListener("click", function(e) {
                e.preventDefault();
                console.log('切换到登录表单');
                registerForm.style.display = "none";
                loginForm.style.display = "block";
            });

            // 登录按钮点击事件
            loginBtn.addEventListener("click", function() {
                console.log('登录按钮点击');
                // 获取输入的账号密码
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                // 清空之前的错误提示
                errorMsg.innerText = "";

                // 校验逻辑
                if (!username || !password) {
                    errorMsg.innerText = "用户名和密码不能为空！";
                    return;
                }

                console.log('发送登录请求:', { username, password: '***' });
                // 发送 POST 请求到后端
                fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                })
                .then(response => {
                    console.log('登录响应状态:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('登录响应数据:', data);
                    if (data.success) {
                        // 登录成功：跳转到欢迎页面
                        window.location.href = '/welcome.html';
                    } else {
                        // 登录失败：显示错误提示
                        errorMsg.innerText = data.message || '登录失败！';
                    }
                })
                .catch(error => {
                    console.error('登录错误:', error);
                    errorMsg.innerText = '网络错误，请稍后重试！';
                });
            });

            // 注册按钮点击事件
            registerBtn.addEventListener("click", function() {
                console.log('注册按钮点击');
                // 获取输入的注册信息
                const username = regUsernameInput.value.trim();
                const password = regPasswordInput.value.trim();
                const confirmPassword = regConfirmPasswordInput.value.trim();

                // 清空之前的错误提示
                regErrorMsg.innerText = "";

                // 校验逻辑
                if (!username || !password || !confirmPassword) {
                    regErrorMsg.innerText = "用户名和密码不能为空！";
                    return;
                }
                
                if (password !== confirmPassword) {
                    regErrorMsg.innerText = "两次输入的密码不一致！";
                    return;
                }

                console.log('发送注册请求:', { username, password: '***' });
                // 发送 POST 请求到后端
                fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                })
                .then(response => {
                    console.log('注册响应状态:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('注册响应数据:', data);
                    if (data.success) {
                        // 注册成功：切换到登录表单
                        regErrorMsg.innerText = "注册成功，请登录！";
                        regErrorMsg.style.color = "green";
                        setTimeout(() => {
                            registerForm.style.display = "none";
                            loginForm.style.display = "block";
                            regErrorMsg.innerText = "";
                            regErrorMsg.style.color = "red";
                        }, 2000);
                    } else {
                        // 注册失败：显示错误提示
                        regErrorMsg.innerText = data.message || '注册失败！';
                    }
                })
                .catch(error => {
                    console.error('注册错误:', error);
                    regErrorMsg.innerText = '网络错误，请稍后重试！';
                });
            });
        };
    </script>
</body>
</html>
