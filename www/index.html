<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自定义登录测试页面</title>
    <style>
        /* 简单美化，方便截图和操作 */
        .container {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .form-item {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 80px;
        }
        input {
            width: 250px;
            height: 25px;
            padding: 0 5px;
        }
        button {
            width: 100%;
            height: 35px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #errorMsg {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
        #successMsg {
            color: green;
            margin-top: 10px;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录表单：核心测试元素 -->
        <div id="loginForm">
            <h2 style="text-align: center;">用户登录</h2>
            <div class="form-item">
                <label>用户名：</label>
                <!-- 用户名输入框：id固定为username，用于XPath定位 -->
                <input type="text" id="username" maxlength="20" placeholder="请输入用户名">
            </div>
            <div class="form-item">
                <label>密  码：</label>
                <!-- 密码输入框：id固定为password，用于XPath定位 -->
                <input type="password" id="password" maxlength="20" placeholder="请输入密码">
            </div>
            <!-- 登录按钮：id固定为loginBtn，用于XPath定位 -->
            <button id="loginBtn">登 录</button>
            <!-- 错误提示信息：id固定为errorMsg，用于断言校验 -->
            <div id="errorMsg"></div>
        </div>
        <!-- 登录成功提示：id固定为successMsg，用于断言校验 -->
        <div id="successMsg" style="display: none;">
            恭喜您，登录成功！<br>
            欢迎进入系统
        </div>
    </div>

    <!-- 极简登录逻辑：无需后端，纯前端实现 -->
    <script>
        // 预设正确的账号密码：admin / 123456
        const correctUsername = "admin";
        const correctPassword = "123456";

        // 获取元素
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const errorMsg = document.getElementById("errorMsg");
        const loginForm = document.getElementById("loginForm");
        const successMsg = document.getElementById("successMsg");

        // 登录按钮点击事件
        loginBtn.addEventListener("click", function() {
            // 获取输入的账号密码
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // 清空之前的错误提示
            errorMsg.innerText = "";

            // 校验逻辑
            if (!username || !password) {
                errorMsg.innerText = "用户名和密码不能为空！";
                return;
            }
            if (username === correctUsername && password === correctPassword) {
                // 登录成功：隐藏表单，显示成功提示
                loginForm.style.display = "none";
                successMsg.style.display = "block";
            } else {
                // 登录失败：显示错误提示
                errorMsg.innerText = "用户名或密码错误！";
            }
        });
    </script>
</body>
</html>
